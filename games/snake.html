<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake.io Pro - FX Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
            margin: 0;
        }
        canvas {
            display: block;
            background-color: #020617;
            cursor: crosshair;
        }
        .ui-shadow {
            text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        }
        #loading-screen {
            background: #000;
            overflow: hidden;
        }
        .loading-bg {
            position: absolute;
            inset: -100%;
            background: 
                radial-gradient(circle at center, transparent 0%, #000 70%),
                repeating-conic-gradient(from 0deg, #111 0deg 10deg, #22c55e11 10deg 20deg);
            animation: hyperspace 4s linear infinite;
            filter: blur(2px);
        }
        @keyframes hyperspace {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(2) rotate(15deg); }
        }
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }
        .loading-bar-container {
            width: 240px;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #loading-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            box-shadow: 0 0 15px #22c55e;
            transition: width 0.5s ease-out;
        }
        .skin-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.2);
        }
        .neon-glow {
            filter: drop-shadow(0 0 8px currentColor);
        }
    </style>
</head>
<body class="relative h-screen w-screen">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="loading-bg"></div>
        <div class="relative z-10 flex flex-col items-center">
            <h1 class="text-6xl font-black italic tracking-tighter text-white mb-2 drop-shadow-[0_0_25px_rgba(34,197,94,0.5)]">
                SNAKE<span class="text-green-500">.FX</span>
            </h1>
            <div id="loader-text" class="text-[10px] font-mono text-green-500 uppercase tracking-[0.4em] animate-pulse">Initializing Shaders...</div>
            <div class="loading-bar-container">
                <div id="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- UI -->
    <div id="game-ui" class="absolute inset-0 z-10 pointer-events-none select-none p-8 flex flex-col justify-between ui-hidden transition-opacity duration-500">
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-1">
                <h1 class="text-4xl font-black italic tracking-tighter text-white ui-shadow">
                    SNAKE<span class="text-green-500">.FX</span>
                </h1>
                <div id="status" class="text-[11px] font-mono text-emerald-400 uppercase tracking-widest flex items-center gap-3 bg-black/40 px-3 py-1 rounded-full border border-white/5 backdrop-blur-sm">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    <span id="online-count">SYNCING ARENA...</span>
                </div>
            </div>

            <div class="bg-slate-950/80 backdrop-blur-xl border border-white/10 p-5 rounded-2xl min-w-[240px] shadow-2xl">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-3 border-b border-white/5 pb-2 text-center">Leaderboard</h2>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <div class="group bg-slate-950/80 backdrop-blur-xl p-5 rounded-2xl border border-white/10 shadow-2xl">
                <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Current Mass</div>
                <div id="score-val" class="text-5xl font-black text-green-400 italic ui-shadow">0</div>
            </div>
            
            <div class="flex flex-col gap-2 items-end">
                <div class="text-[10px] text-slate-500 font-mono uppercase tracking-widest bg-black/60 px-4 py-2 rounded-full border border-white/5 backdrop-blur-sm shadow-lg">
                    [L-CLICK] BOOST • [MOUSE] AIM • [10S] BITE CD
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Menu / Skin Maker -->
    <div id="overlay" class="absolute inset-0 z-20 flex items-center justify-center bg-slate-950/98 transition-opacity duration-500 ui-hidden">
        <div class="text-center max-w-lg w-full p-10 space-y-8">
            <div class="space-y-2">
                <h2 id="overlay-title" class="text-7xl font-black tracking-tighter text-white uppercase italic">Arena</h2>
                <p id="overlay-msg" class="text-slate-500 font-medium text-sm tracking-widest uppercase">Select your appearance</p>
            </div>

            <div class="bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-[0_0_80px_rgba(0,0,0,0.5)] space-y-8 backdrop-blur-md">
                <div id="skin-preview" class="skin-preview"></div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-random-skin" class="py-4 bg-white/5 hover:bg-white/10 text-[11px] font-black rounded-2xl transition-all uppercase tracking-widest border border-white/5">
                        New Palette
                    </button>
                    <button id="btn-next-pattern" class="py-4 bg-white/5 hover:bg-white/10 text-[11px] font-black rounded-2xl transition-all uppercase tracking-widest border border-white/5">
                        New Pattern
                    </button>
                </div>
            </div>
            
            <form id="spawn-form" class="space-y-4">
                <input type="text" id="nick-input" placeholder="ENTER NICKNAME" maxlength="12" required
                    class="w-full bg-slate-900/50 border-2 border-slate-800 rounded-2xl px-6 py-5 text-center text-xl font-bold tracking-[0.2em] focus:border-green-500 outline-none transition-all text-white uppercase placeholder:text-slate-700">
                
                <button type="submit" class="w-full py-6 bg-green-500 hover:bg-green-400 text-slate-950 font-black text-xl rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-[0_15px_35px_rgba(34,197,94,0.3)] uppercase tracking-[0.1em]">
                    Spawn Into Arena
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // --- CONFIG & SUPABASE ---
        const SUPABASE_URL = "https://wpcgfesucvhziqzaszwk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VUuJakv5M-gP-fgBgR1V9Q_Si0eBgIa";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const WORLD_SIZE = 4000;
        const GRID_STEP = 120;
        const BASE_SPEED = 3.6;
        const BOOST_SPEED = 7.5;
        const SYNC_RATE = 45; 
        const MAX_FOOD = 250;
        const VIEW_LERP = 0.08;
        const COOLDOWN_MS = 10000;
        const PATTERNS = ['solid', 'stripes', 'dots', 'glow', 'ring'];

        // --- STATE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const userId = 'u-' + Math.random().toString(36).substring(2, 9);
        
        let nickname = "Predator";
        let players = {};
        let foodItems = [];
        let particles = [];
        let isAlive = false;
        let score = 0;
        let isBoosting = false;
        let lastBroadcast = 0;
        let camX = WORLD_SIZE / 2, camY = WORLD_SIZE / 2, camZoom = 0.8;
        let mouseX = 0, mouseY = 0, keysPressed = {};
        let channel = null, biteCooldowns = {};

        // Custom Skin
        let currentSkin = {
            color1: `hsl(${Math.random() * 360}, 85%, 60%)`,
            color2: `hsl(${Math.random() * 360}, 85%, 40%)`,
            pattern: 'stripes'
        };

        let mySnake = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: Math.random()*Math.PI*2, segments: [], width: 22 };
        let bot = { uid: 'bot-000', nick: 'CYBER-REX', skin: { color1: '#ff0055', color2: '#5500ff', pattern: 'glow' }, x: 0, y: 0, angle: 0, score: 150, segments: [] };

        // --- FX SYSTEMS ---
        function spawnBiteFX(x, y, color, count) {
            for(let i=0; i<count; i++){
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*15, 
                    vy: (Math.random()-0.5)*15, 
                    life: 1, 
                    color, 
                    size: Math.random()*8+4
                });
                foodItems.push({ x: x+(Math.random()-0.5)*80, y: y+(Math.random()-0.5)*80, v: Math.random()*4+2, c: color });
            }
        }

        function spawnBoostFX(x, y, angle, color) {
            particles.push({
                x, y, 
                vx: -Math.cos(angle)*5 + (Math.random()-0.5)*2, 
                vy: -Math.sin(angle)*5 + (Math.random()-0.5)*2, 
                life: 0.8, 
                color: 'rgba(255,255,255,0.4)', 
                size: 3
            });
        }

        // --- SKIN UI ---
        function updateSkinPreview() {
            const preview = document.getElementById('skin-preview');
            const { color1: c1, color2: c2, pattern: p } = currentSkin;
            if (p === 'solid') preview.style.background = c1;
            else if (p === 'stripes') preview.style.background = `repeating-linear-gradient(45deg, ${c1}, ${c1} 10px, ${c2} 10px, ${c2} 20px)`;
            else if (p === 'dots') {
                preview.style.background = c1;
                preview.style.backgroundImage = `radial-gradient(${c2} 20%, transparent 20%)`;
                preview.style.backgroundSize = '20px 20px';
            } else if (p === 'glow') preview.style.background = `radial-gradient(circle, ${c1} 0%, ${c2} 100%)`;
            else if (p === 'ring') preview.style.background = `repeating-radial-gradient(circle, ${c1}, ${c1} 10px, ${c2} 10px, ${c2} 20px)`;
        }

        document.getElementById('btn-random-skin').onclick = () => {
            const hue = Math.random() * 360;
            currentSkin.color1 = `hsl(${hue}, 85%, 60%)`;
            currentSkin.color2 = `hsl(${(hue + 40) % 360}, 85%, 35%)`;
            updateSkinPreview();
        };

        document.getElementById('btn-next-pattern').onclick = () => {
            currentSkin.pattern = PATTERNS[(PATTERNS.indexOf(currentSkin.pattern) + 1) % PATTERNS.length];
            updateSkinPreview();
        };

        // --- GAME ENGINE ---
        function initRealtime() {
            channel = supabase.channel('snake_arena_v3', { config: { broadcast: { self: false } } });
            channel
                .on('broadcast', { event: 'm' }, ({ payload }) => { // Shortened 'move'
                    if (!players[payload.u]) players[payload.u] = { ...payload, ls: Date.now(), lx: payload.x, ly: payload.y };
                    else { Object.assign(players[payload.u], payload); players[payload.u].ls = Date.now(); }
                })
                .on('broadcast', { event: 'd' }, ({ payload }) => { // Shortened 'die'
                    if (payload.u === userId) die(payload.r);
                    else delete players[payload.u];
                })
                .on('broadcast', { event: 'b' }, ({ payload }) => { // Shortened 'bite'
                    if (payload.t === userId) {
                        score = Math.max(0, score - payload.a);
                        document.getElementById('score-val').innerText = Math.floor(score);
                    }
                })
                .subscribe();
        }

        function broadcast() {
            if (!isAlive || !channel) return;
            const now = Date.now();
            if (now - lastBroadcast < SYNC_RATE) return;
            channel.send({
                type: 'broadcast', event: 'm',
                payload: { u: userId, n: nickname, x: mySnake.x, y: mySnake.y, a: mySnake.angle, s: Math.floor(score), k: currentSkin, h: mySnake.segments.filter((_, i) => i % 5 === 0).slice(0, 30) }
            });
            lastBroadcast = now;
        }

        function spawn(e) {
            e.preventDefault();
            nickname = document.getElementById('nick-input').value.trim() || "Predator";
            isAlive = true; score = 0;
            mySnake.x = Math.random()*(WORLD_SIZE-800)+400;
            mySnake.y = Math.random()*(WORLD_SIZE-800)+400;
            mySnake.segments = Array(15).fill({x: mySnake.x, y: mySnake.y});
            document.getElementById('overlay').classList.add('ui-hidden');
            document.getElementById('game-ui').classList.remove('ui-hidden');
        }

        function die(reason) {
            if (!isAlive) return;
            isAlive = false;
            channel.send({ type: 'broadcast', event: 'd', payload: { u: userId, r: reason } });
            document.getElementById('overlay-title').innerText = "FATALITY";
            document.getElementById('overlay-msg').innerText = reason || "Eaten alive";
            document.getElementById('overlay').classList.remove('ui-hidden');
            document.getElementById('game-ui').classList.add('ui-hidden');
        }

        function update() {
            const now = Date.now();
            
            // Bot Logic
            const bt = now / 4000;
            bot.x = (WORLD_SIZE/2) + Math.cos(bt)*1200;
            bot.y = (WORLD_SIZE/2) + Math.sin(bt*0.7)*1200;
            bot.angle = bt + Math.PI/2;
            bot.segments.unshift({x: bot.x, y: bot.y});
            if(bot.segments.length > 50) bot.segments.pop();

            if (!isAlive) return;

            // Movement
            let targetAngle = mySnake.angle;
            let dx=0, dy=0;
            if (keysPressed['KeyW'] || keysPressed['ArrowUp']) dy--;
            if (keysPressed['KeyS'] || keysPressed['ArrowDown']) dy++;
            if (keysPressed['KeyA'] || keysPressed['ArrowLeft']) dx--;
            if (keysPressed['KeyD'] || keysPressed['ArrowRight']) dx++;
            if (dx!==0 || dy!==0) targetAngle = Math.atan2(dy, dx);
            else targetAngle = Math.atan2(mouseY - canvas.height/2, mouseX - canvas.width/2);

            let diff = targetAngle - mySnake.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            mySnake.angle += diff * 0.18;

            const spd = (isBoosting && score > 5) ? BOOST_SPEED : BASE_SPEED;
            if (isBoosting && score > 5) {
                score -= 0.08;
                spawnBoostFX(mySnake.x, mySnake.y, mySnake.angle, currentSkin.color1);
            }

            mySnake.x += Math.cos(mySnake.angle)*spd;
            mySnake.y += Math.sin(mySnake.angle)*spd;
            if(mySnake.x<0 || mySnake.x>WORLD_SIZE || mySnake.y<0 || mySnake.y>WORLD_SIZE) die("Boundary Hit");

            mySnake.segments.unshift({x: mySnake.x, y: mySnake.y});
            while(mySnake.segments.length > 15 + Math.floor(score/4)) mySnake.segments.pop();
            mySnake.width = 24 + (score / 140);

            // Particles
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                return p.life > 0;
            });

            // Food
            foodItems = foodItems.filter(f => {
                if (Math.hypot(mySnake.x - f.x, mySnake.y - f.y) < mySnake.width) {
                    score += f.v;
                    document.getElementById('score-val').innerText = Math.floor(score);
                    return false;
                }
                return true;
            });
            while(foodItems.length < MAX_FOOD) foodItems.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, v: Math.random()*3+4, c: `hsl(${Math.random()*360},100%,70%)` });

            // Collisions
            const enemies = [...Object.values(players), bot];
            for (let p of enemies) {
                const segs = p.uid === 'bot-000' ? p.segments : (p.h || []);
                if (!segs.length) continue;
                const eW = 24 + ((p.s||p.score)/140);

                for (let i=0; i<segs.length; i+=2) {
                    const dist = Math.hypot(mySnake.x - segs[i].x, mySnake.y - segs[i].y);
                    if (dist < (mySnake.width + eW) * 0.45) {
                        const lb = biteCooldowns[p.u || p.uid] || 0;
                        if (score > (p.s||p.score) && (now - lb > COOLDOWN_MS)) {
                            const b = Math.min((p.s||p.score) * 0.2, 60);
                            if(p.uid === 'bot-000') bot.score -= b;
                            else channel.send({ type: 'broadcast', event: 'b', payload: { t: p.u, a: b } });
                            spawnBiteFX(segs[i].x, segs[i].y, p.k?.color1 || p.skin?.color1 || 'white', 8);
                            score += b * 0.6;
                            biteCooldowns[p.u || p.uid] = now;
                        } else if (score <= (p.s||p.score) && i === 0) die(p.n || p.nick);
                    }
                }
            }

            camX += (mySnake.x - camX) * VIEW_LERP;
            camY += (mySnake.y - camY) * VIEW_LERP;
            camZoom += (Math.max(0.3, 0.9 - (score / 1500)) - camZoom) * 0.03;
            broadcast();
            if (now % 1000 < 20) updateLeaderboard();
        }

        function drawSnakeEntity(segs, skin, label, s, a, uid) {
            if (!segs || segs.length < 2) return;
            const w = 24 + (s / 140);
            const now = Date.now();
            const cd = Math.max(0, COOLDOWN_MS - (now - (biteCooldowns[uid] || 0)));

            ctx.save();
            if (uid !== userId && cd > 0) ctx.globalAlpha = 0.45;

            // --- DEEP 3D SHADOW ---
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 25;
            ctx.shadowOffsetX = 15;
            ctx.shadowOffsetY = 15;

            // --- GLOW EFFECT ---
            ctx.strokeStyle = skin.color1;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = w;
            ctx.beginPath();
            ctx.moveTo(segs[0].x, segs[0].y);
            for(let i=1; i<segs.length; i++) ctx.lineTo(segs[i].x, segs[i].y);
            ctx.stroke();

            // --- PATTERNS ---
            ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            if (skin.pattern === 'stripes') {
                ctx.setLineDash([w, w]); ctx.strokeStyle = skin.color2; ctx.stroke(); ctx.setLineDash([]);
            } else if (skin.pattern === 'dots') {
                ctx.fillStyle = skin.color2;
                for(let i=0; i<segs.length; i+=3) { ctx.beginPath(); ctx.arc(segs[i].x, segs[i].y, w*0.3, 0, Math.PI*2); ctx.fill(); }
            } else if (skin.pattern === 'glow') {
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = w*0.3; ctx.stroke();
            } else if (skin.pattern === 'ring') {
                ctx.strokeStyle = skin.color2; ctx.lineWidth = w*0.8; ctx.setLineDash([5, 15]); ctx.stroke(); ctx.setLineDash([]);
            }

            // --- GLOSSY HIGHLIGHT (3D EFFECT) ---
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = w * 0.3;
            ctx.beginPath();
            ctx.moveTo(segs[0].x - w*0.15, segs[0].y - w*0.15);
            for(let i=1; i<segs.length; i++) ctx.lineTo(segs[i].x - w*0.15, segs[i].y - w*0.15);
            ctx.stroke();

            // --- HEAD ---
            const h = segs[0];
            ctx.save();
            ctx.translate(h.x, h.y); ctx.rotate(a || 0);
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(w*0.3, -w*0.3, w*0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w*0.3, w*0.3, w*0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(w*0.4, -w*0.3, w*0.08, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w*0.4, w*0.3, w*0.08, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // --- UI TAG ---
            ctx.globalAlpha = 1;
            ctx.fillStyle = 'white'; ctx.font = 'black 14px Inter'; ctx.textAlign = 'center';
            ctx.fillText(label.toUpperCase() + (cd > 0 ? ` [${Math.ceil(cd/1000)}S]` : ''), h.x, h.y - (w + 15));
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(camZoom, camZoom);
            ctx.translate(-camX, -camY);

            // GRID
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for(let x=0; x<=WORLD_SIZE; x+=GRID_STEP) { ctx.moveTo(x,0); ctx.lineTo(x,WORLD_SIZE); }
            for(let y=0; y<=WORLD_SIZE; y+=GRID_STEP) { ctx.moveTo(0,y); ctx.lineTo(WORLD_SIZE,y); }
            ctx.stroke();

            // PARTICLES
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // FOOD
            foodItems.forEach(f => {
                ctx.shadowBlur = 10; ctx.shadowColor = f.c;
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.v+1, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            drawSnakeEntity(bot.segments, bot.skin, bot.nick, bot.score, bot.angle, bot.uid);
            for(let id in players) drawSnakeEntity(players[id].h, players[id].k, players[id].n, players[id].s, players[id].a, id);
            if(isAlive) drawSnakeEntity(mySnake.segments, currentSkin, nickname, score, mySnake.angle, userId);

            ctx.restore();
            requestAnimationFrame(draw);
        }

        function updateLeaderboard() {
            const list = [...Object.values(players), bot, isAlive ? {n: nickname, s: score} : null].filter(Boolean).sort((a,b) => (b.s||b.score) - (a.s||a.score));
            document.getElementById('leaderboard').innerHTML = list.slice(0, 8).map((p, i) => `
                <div class="flex justify-between items-center text-[11px] py-1 ${p.n === nickname ? 'text-green-400 font-black' : 'text-slate-300'}">
                    <span class="truncate max-w-[140px] uppercase tracking-tighter">${i+1}. ${p.n || p.nick}</span>
                    <span class="font-mono opacity-50">${Math.floor(p.s || p.score)}</span>
                </div>
            `).join('');
            document.getElementById('online-count').innerText = `${list.length} PEOPLE IN ARENA`;
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.onkeydown = e => keysPressed[e.code] = true;
        window.onkeyup = e => delete keysPressed[e.code];
        window.onmousemove = e => { mouseX = e.clientX; mouseY = e.clientY; };
        window.onmousedown = () => isBoosting = true;
        window.onmouseup = () => isBoosting = false;
        document.getElementById('spawn-form').onsubmit = spawn;

        // Init
        resize();
        updateSkinPreview();
        initRealtime();
        setInterval(update, 1000/60);
        requestAnimationFrame(draw);
        
        setTimeout(() => {
            document.getElementById('loading-bar-fill').style.width = "100%";
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('ui-hidden');
                    document.getElementById('overlay').classList.remove('ui-hidden');
                }, 1000);
            }, 500);
        }, 1500);
    </script>
</body>
</html>
